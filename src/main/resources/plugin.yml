name: IncrementalBackup
version: 1.0.0
main: dev.backup.incrementalbackup.IncrementalBackupPlugin
api-version: "1.21"
description: Incremental and full backup plugin with Google Drive support
author: IncrementalBackup

commands:
  backup:
    description: Backup commands
    usage: /backup <incremental|full|status|reload>
    permission: incrementalbackup.admin

permissions:
  incrementalbackup.admin:
    description: Access to all backup commands
    default: op
