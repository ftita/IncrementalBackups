# ============================================================
#  IncrementalBackup - Configuration
# ============================================================

google-drive:
  # Path to your Service Account JSON key file (relative to plugin folder)
  service-account-key: "service-account.json"
  # Google Drive folder ID where backups will be uploaded
  # Leave empty to upload to root of Drive
  drive-folder-id: ""

backup:
  # ---- INCREMENTAL BACKUP ----
  incremental:
    # Enable/disable scheduled incremental backups
    enabled: true
    # How often to run incremental backups (in minutes)
    interval-minutes: 30
    # Files and folders to include in incremental backups
    # Paths are relative to the server root directory
    include:
      - "world"
      - "world_nether"
      - "world_the_end"
      - "plugins"
    # File patterns to EXCLUDE from incremental backups (glob patterns)
    exclude:
      - "**/*.jar"
      - "**/*.log"
      - "**/logs/**"
      - "**/cache/**"
    # Only backup files modified since the last backup
    only-modified: true

  # ---- FULL BACKUP ----
  full:
    # Enable/disable scheduled full backups
    enabled: true
    # Cron-like schedule: day-of-week (MON,TUE,WED,THU,FRI,SAT,SUN or DAILY)
    # and time in HH:MM format (24h)
    schedule-day: "DAILY"
    schedule-time: "04:00"
    # Files and folders to include in full backups
    # Use "." to backup the entire server directory
    include:
      - "world"
      - "world_nether"
      - "world_the_end"
      - "plugins"
      - "server.properties"
    # File patterns to EXCLUDE from full backups
    exclude:
      - "**/*.jar"
      - "**/*.log"
      - "**/logs/**"
      - "**/cache/**"
    # Save the world before doing a full backup (recommended)
    save-world-before: true

  # ---- RETENTION ----
  retention:
    # How many incremental backups to keep on Google Drive (0 = unlimited)
    keep-incremental: 48
    # How many full backups to keep on Google Drive (0 = unlimited)
    keep-full: 7

# Prefix for all plugin messages in chat
message-prefix: "&8[&bBackup&8] &r"
